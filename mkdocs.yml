site_name: TimeSeriesEcon.m
site_description: A time-series language for macroeconomics, ported from TimeSeriesEcon.jl to MATLAB.
repo_url: https://github.com/jasonjensen/timeseriesecon.m
repo_name: jasonjensen/timeseriesecon.m
docs_dir: docs

# The Markdown files under docs/ are written to be readable as-is on GitHub.
# This config is optional: it mirrors the navigation of the sister Python
# project (https://nic2020.github.io/TimeSeriesEconPy/) so the two sites feel
# the same. Build/serve with `mkdocs serve` (pip install mkdocs-material).
# No MATLAB is required to build the docs.

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Tutorials:
      - "1. TimeSeriesEcon": tutorials/1_timeseriesecon.md
  - Reference:
      - Frequencies: reference/frequencies.md
      - "MIT & MITRange": reference/mit.md
      - TSeries: reference/tseries.md
      - MVTSeries: reference/mvtseries.md
      - "Workspaces (structs)": reference/workspace.md
      - "Math (shift, diff, moving, undiff)": reference/math.md
      - "Statistics (mean, std, cor)": reference/stats.md
      - Indexing (lookup): reference/indexing.md
      - "Frequency conversion (fconvert)": reference/fconvert.md
      - "Recursive (rec)": reference/recursive.md
      - "Linear algebra": reference/linalg.md
      - "Misc helpers (overlay, compare, reindex)": reference/various.md
      - Options: reference/options.md
      - Plotting: reference/plotting.md
      - "X-13ARIMA-SEATS (x13)": reference/x13.md
  - Design notes:
      - Overview: design/decisions.md
      - Frequency model: design/frequency_model.md
      - Migration from Julia: design/migration_from_julia.md
      - Migration from Python: design/migration_from_python.md
  - API index: api_index.md
  - FAQ: faq.md
